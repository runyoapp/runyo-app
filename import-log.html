<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>runyo — Import Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F1EEE6;--surface:#EAEFEC;--paper:#FBF7EC;
    --ink:#0E1F1A;--ink2:#5E6F69;--mute:#86968F;
    --accent:#00B98E;--accent-light:rgba(0,185,142,0.12);
    --line:#DEDACA;--err:#D94F3D;--err-light:rgba(217,79,61,0.1);
    --sw:'Sora',system-ui,sans-serif;--mw:'JetBrains Mono',monospace;
  }
  body{background:var(--bg);color:var(--ink);font-family:var(--sw);font-size:13px;padding:32px;min-height:100vh;-webkit-font-smoothing:antialiased}
  h1{font-size:22px;font-weight:700;letter-spacing:-0.03em;margin-bottom:4px;color:var(--ink)}
  .sub{font-size:11px;color:var(--mute);font-family:var(--mw);margin-bottom:28px}
  .entry{background:var(--paper);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(14,31,26,0.04)}
  .entry-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid transparent;cursor:pointer;user-select:none;transition:background 0.1s}
  .entry-header:hover{background:var(--surface)}
  .entry.open .entry-header{border-bottom-color:var(--line)}
  .badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:6px;text-transform:uppercase;flex-shrink:0;font-family:var(--mw)}
  .ok{background:var(--accent-light);color:var(--accent)}
  .fail{background:var(--err-light);color:var(--err)}
  .entry-title{flex:1;font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .entry-meta{font-size:10px;color:var(--mute);flex-shrink:0;font-family:var(--mw)}
  .entry-body{padding:18px;display:none;background:var(--bg)}
  .entry.open .entry-body{display:block}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:14px}
  .kv{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
  .kv-label{font-size:9px;color:var(--mute);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-family:var(--mw)}
  .kv-value{font-size:12px;color:var(--ink2);word-break:break-word;font-family:var(--mw)}
  .kv-value.good{color:var(--accent);font-weight:600}
  .kv-value.bad{color:var(--err);font-weight:600}
  .kv-value.muted{color:var(--mute)}
  .section-title{font-size:9px;color:var(--mute);letter-spacing:1px;text-transform:uppercase;margin:14px 0 6px;font-family:var(--mw)}
  .error-box{background:var(--err-light);border:1px solid var(--err);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--err);margin-bottom:10px;font-family:var(--mw)}
  pre{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:12px;font-size:10px;color:var(--ink2);overflow:auto;max-height:300px;white-space:pre-wrap;word-break:break-all;line-height:1.6;font-family:var(--mw)}
  .token-row{display:flex;gap:8px;flex-wrap:wrap}
  .token-chip{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--mute);font-family:var(--mw)}
  .token-chip span{color:var(--accent);font-weight:700}
  .empty{text-align:center;padding:60px 20px;color:var(--mute);font-size:13px}
  .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .filter-btn{background:var(--paper);border:1px solid var(--line);color:var(--mute);font-size:10px;padding:6px 14px;border-radius:999px;cursor:pointer;letter-spacing:0.5px;font-family:var(--mw);transition:all 0.12s}
  .filter-btn:hover{border-color:var(--ink2);color:var(--ink2)}
  .filter-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
  #count{font-size:10px;color:var(--mute);margin-left:auto;font-family:var(--mw)}
  button.refresh-btn{background:none;border:none;color:var(--mute);cursor:pointer;font-size:11px;font-family:var(--mw);padding:0;transition:color 0.12s}
  button.refresh-btn:hover{color:var(--accent)}
  .dl-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--paper);border:1px solid var(--line);border-radius:8px;color:var(--ink2);font-family:var(--mw);font-size:11px;cursor:pointer;transition:all 0.12s}
  .dl-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<h1>runyo — Import Log</h1>
<div class="sub">Schema import geschiedenis · <span id="lastUpdate">laden…</span> <button class="refresh-btn" onclick="load()">↺ vernieuwen</button></div>

<div class="toolbar">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Alles</button>
  <button class="filter-btn" data-filter="ok" onclick="setFilter('ok',this)">✓ Geslaagd</button>
  <button class="filter-btn" data-filter="fail" onclick="setFilter('fail',this)">✗ Mislukt</button>
  <span id="count"></span>
</div>

<div id="log"></div>

<script>
const API = 'https://runyo-auth-production.up.railway.app/ai/debug-log';
const DAYS = ['Ma','Di','Wo','Do','Vr','Za','Zo'];
let _data = [];
let _filter = 'all';

function setFilter(f, btn) {
  _filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(_data);
}

function fmt(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('nl-NL') + ' ' + d.toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function fmtDur(ms) {
  if (!ms) return '—';
  return ms > 1000 ? (ms/1000).toFixed(1)+'s' : ms+'ms';
}

function fmtSize(b) {
  if (!b) return '—';
  return b > 1024*1024 ? (b/1024/1024).toFixed(1)+' MB' : b > 1024 ? (b/1024).toFixed(0)+' KB' : b+' B';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function kv(label, value, cls='') {
  return `<div class="kv"><div class="kv-label">${label}</div><div class="kv-value ${cls}">${esc(value)}</div></div>`;
}

function renderEntry(e, idx) {
  const ok = e.success === true;
  const ts = fmt(e.ts || e._received);
  const dur = fmtDur(e.aiDuration);
  const s = e.settings || {};
  const runDays = Array.isArray(s.runDays) ? s.runDays.map(i => DAYS[i]).join(', ') : '—';
  const tu = e.tokenUsage || {};

  const metaGrid = `<div class="grid">
    ${kv('Bestand', e.fileName || '—')}
    ${kv('Type', e.fileType || '—')}
    ${kv('Grootte', fmtSize(e.fileSize))}
    ${kv('Tijdstip', ts)}
    ${kv('Verwerkingstijd', dur, dur==='—'?'muted':'')}
    ${kv('Resultaat', ok ? (e.parsedCount||0)+' activiteiten' : 'Mislukt', ok?'good':'bad')}
    ${kv('Begindatum', s.startDate || '—')}
    ${kv('Hardloopdagen', runDays)}
    ${kv('Rustdagen behouden', s.keepRest !== undefined ? (s.keepRest ? 'Ja' : 'Nee') : '—')}
  </div>`;

  const tokenBlock = (tu.input_tokens || tu.output_tokens) ? `
    <div class="section-title">Token gebruik</div>
    <div class="token-row">
      <div class="token-chip">Input <span>${tu.input_tokens ?? '—'}</span></div>
      <div class="token-chip">Output <span>${tu.output_tokens ?? '—'}</span></div>
      <div class="token-chip">Totaal <span>${(tu.input_tokens||0)+(tu.output_tokens||0)}</span></div>
    </div>` : '';

  const clientInfo = e.client ? `
    <div class="section-title">Client info</div>
    <div class="grid">
      ${kv('Scherm', e.client.screen || '—')}
      ${kv('Taal', e.client.lang || '—')}
      ${kv('Online', e.client.online !== undefined ? (e.client.online ? 'Ja' : 'Nee') : '—')}
      ${kv('Platform', e.client.platform || '—')}
    </div>
    <div class="kv" style="margin-bottom:14px"><div class="kv-label">User Agent</div><div class="kv-value" style="font-size:9px;color:var(--mute)">${esc(e.client.userAgent || '—')}</div></div>` : '';

  const errorBlock = e.error ? `<div class="error-box">${esc(e.error)}</div>` : '';

  const downloadBlock = e.fileBase64 ? `
    <div class="section-title">Origineel bestand</div>
    <button class="dl-btn" onclick="downloadLogFile(${idx})">&#x2B07; Download ${esc(e.fileName||'bestand')}</button>` : '';

  const rapportBlock = e.rapport ? `
    <div class="section-title">Importrapportage</div>
    <div style="background:var(--accent-light);border:1px solid var(--accent);border-radius:8px;padding:12px;font-size:12px;color:var(--ink);line-height:1.7;margin-bottom:4px">${esc(e.rapport)}</div>` : '';

  const rawBlock = e.rawResponse ? `
    <div class="section-title">Analyse respons (raw)</div>
    <pre>${esc(e.rawResponse)}</pre>` : '';

  const fileBlock = e.fileContent ? `
    <div class="section-title">Bestandsinhoud (eerste 8000 tekens)</div>
    <pre>${esc(e.fileContent)}</pre>` : '';

  return `<div class="entry" id="e${idx}">
    <div class="entry-header" onclick="toggle(${idx})">
      <span class="badge ${ok?'ok':'fail'}">${ok?'✓ OK':'✗ FOUT'}</span>
      <span class="entry-title">${esc(e.fileName||'onbekend bestand')}</span>
      <span class="entry-meta">${ts} · ${dur}</span>
    </div>
    <div class="entry-body">
      ${errorBlock}
      ${metaGrid}
      ${tokenBlock}
      ${clientInfo}
      ${downloadBlock}
      ${rapportBlock}
      ${rawBlock}
      ${fileBlock}
    </div>
  </div>`;
}

function toggle(idx) {
  document.getElementById('e'+idx).classList.toggle('open');
}

function render(data) {
  const filtered = data.filter(e => {
    if (_filter === 'ok') return e.success === true;
    if (_filter === 'fail') return e.success !== true;
    return true;
  });
  document.getElementById('count').textContent = filtered.length + ' / ' + data.length + ' items';
  const log = document.getElementById('log');
  if (!filtered.length) {
    log.innerHTML = '<div class="empty">Geen entries' + (_filter !== 'all' ? ' voor dit filter' : '') + '</div>';
    return;
  }
  log.innerHTML = filtered.map((e,i) => renderEntry(e,i)).join('');
  if (filtered[0]?.success !== true) document.getElementById('e0')?.classList.add('open');
}

async function load() {
  try {
    const r = await fetch(API + '?_=' + Date.now());
    _data = await r.json();
    document.getElementById('lastUpdate').textContent = 'bijgewerkt ' + new Date().toLocaleTimeString('nl-NL');
    render(_data);
  } catch(e) {
    document.getElementById('log').innerHTML = '<div class="empty">Kon log niet laden: ' + e.message + '</div>';
  }
}

load();
setInterval(load, 30000);

function downloadLogFile(idx) {
  const e = _data[idx];
  if (!e?.fileBase64) return;
  const ext = (e.fileName || '').split('.').pop().toLowerCase();
  const mime = ext === 'pdf' ? 'application/pdf'
    : ext === 'xlsx' ? 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
    : ext === 'png' ? 'image/png' : 'image/jpeg';
  try {
    const bytes = Uint8Array.from(atob(e.fileBase64), c => c.charCodeAt(0));
    const blob = new Blob([bytes], { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = e.fileName || ('bestand.' + ext);
    a.click();
    URL.revokeObjectURL(a.href);
  } catch(err) { console.error('Download mislukt:', err); }
}
</script>
</body>
</html>
