<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Inloggen…</title>
<style>body{background:#F1EEE6;color:#0E1F1A;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-size:14px}</style>
</head>
<body>
<div>Inloggen… even geduld.</div>
<script>
  var p    = new URLSearchParams(window.location.search);
  var code = p.get('code');
  var err  = p.get('error');

  var sent = false;
  if (window.opener) {
    try {
      // Desktop popup: stuur code via postMessage terug naar opener
      window.opener.postMessage(
        code ? {type:'OAUTH_CODE',code:code} : {type:'OAUTH_CODE',error:err||'Onbekende fout'},
        window.location.origin
      );
      sent = true;
    } catch(e) {
      // COOP heeft window.opener geblokkeerd — val terug op localStorage
    }
  }
  if (sent) {
    window.close();
  } else {
    // iOS Safari / COOP-geblokkeerd: sla code op in localStorage.
    // Origineel tabblad luistert via storage-event en rondt de auth af.
    if (code) localStorage.setItem('runyo_oauth_code', code);
    window.location.replace(window.location.origin + '/');
  }
</script>
</body>
</html>
