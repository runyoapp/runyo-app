<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Inloggen…</title>
<style>body{background:#0a0a0a;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-size:14px}</style>
</head>
<body>
<div>Inloggen… dit venster sluit automatisch.</div>
<script>
  const p=new URLSearchParams(window.location.search);
  const code=p.get('code');
  const error=p.get('error');
  if(window.opener){
    // Popup flow: stuur code terug via postMessage
    window.opener.postMessage(
      code ? {type:'OAUTH_CODE',code} : {type:'OAUTH_CODE',error:error||'Onbekende fout'},
      window.location.origin
    );
  } else {
    // Redirect flow (iOS PWA): sla code op in localStorage, ga terug naar app
    if(code) localStorage.setItem('oauth_return_code', code);
    window.location.replace(window.location.origin + '/runyo-app/');
  }
</script>
</body>
</html>
