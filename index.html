<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RunningX">
  <meta name="theme-color" content="#0a0a0a">
  <title>RunningX</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebarLogo" style="display:none">
  <span class="sl-running">RUNNING</span><span class="sl-x">X</span>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">RUNNING<span>X</span></div>
  <div class="loading-sub" id="loadingSub">Laden...</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="dayModal" onclick="closeDayModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeDayModal()">x</button>
    <div id="dayModalContent"></div>
  </div>
</div>

<div class="modal-backdrop" id="raceModal" onclick="closeRaceModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeRaceModal()">x</button>
    <div id="raceModalContent"></div>
  </div>
</div>

<div class="onboarding-overlay" id="onboarding" style="display:none" onclick="onboardingOverlayClick(event)">
  <div class="onboarding-sheet" id="onboardingSheet">
    <div class="ob-header">
      <div class="ob-logo">RUNNING<span>X</span></div>
      <button class="ob-skip" onclick="onboardingFinish()">Overslaan</button>
    </div>
    <div id="onboardingStep1">
      <div class="ob-step">Stap 1 van 2</div>
      <div class="ob-title">Welkom bij RunningX<br>Wat is je doel?</div>
      <div class="settings-field">
        <label class="settings-label" data-i18n="goal_race"></label>
        <input type="text" class="settings-input" id="obRace" placeholder="Bijv. Big10 Rotterdam">
      </div>
      <div class="settings-field">
        <label class="settings-label" data-i18n="goal_date"></label>
        <input type="date" class="settings-input" id="obDate">
      </div>
      <div class="settings-field">
        <label class="settings-label" data-i18n="goal_dist"></label>
        <select class="settings-input" id="obDist">
          <option value="">---</option>
          <option value="5km">5 km</option>
          <option value="10km" selected>10 km</option>
          <option value="10mile">10 mile</option>
          <option value="HM" data-i18n-opt="hm"></option>
          <option value="M" data-i18n-opt="marathon"></option>
          <option value="other" data-i18n-opt="other_dist"></option>
        </select>
      </div>
      <div class="settings-field">
        <label class="settings-label" data-i18n="goal_time"></label>
        <input type="text" class="settings-input" id="obTime" placeholder="37:30">
      </div>
      <button class="btn-primary" onclick="onboardingNext()">Volgende</button>
    </div>
    <div id="onboardingStep2" style="display:none">
      <div class="ob-step">Stap 2 van 2</div>
      <div class="ob-title" data-i18n="pr_title"></div>
      <div class="settings-field">
        <label class="settings-label" data-i18n="pr_add"></label>
        <select class="settings-input" id="obPrDist" onchange="addObPrField()">
          <option value="">---</option>
          <option value="5km">5 km</option>
          <option value="10km">10 km</option>
          <option value="10mile">10 mile</option>
          <option value="HM" data-i18n-opt="hm"></option>
          <option value="M" data-i18n-opt="marathon"></option>
        </select>
      </div>
      <div id="obPrFields"></div>
      <button class="btn-primary" style="margin-top:8px" onclick="onboardingFinish()">Aan de slag</button>
      <button class="btn-secondary" onclick="onboardingFinish()">Overslaan</button>
    </div>
  </div>
</div>

<div class="app">

  <div class="topbar">
    <div style="flex-shrink:0">
      <div class="topbar-logo"><span class="logo-running">RUNNING</span><span class="logo-x">X</span></div>
      <div class="topbar-sub" id="topbarName"></div>
    </div>
    <div style="flex:1"></div>
    <button class="topbar-gear" onclick="openStats()" title="Stats" style="margin-right:4px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <rect x="3" y="14" width="4" height="7" rx="1"/>
        <rect x="10" y="9" width="4" height="12" rx="1"/>
        <rect x="17" y="4" width="4" height="17" rx="1"/>
      </svg>
    </button>
    <!-- DEV: force refresh button — remove when done -->
    <button class="topbar-gear" onclick="devForceRefresh()" title="Force refresh" style="margin-right:4px;color:#ff6b35">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
    </button>
    <button class="topbar-gear" onclick="switchTab('settings')" title="Instellingen">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="desktop-topbar" id="desktopTopbar">
    <div class="dt-breadcrumb">
      <span>RUNNINGX</span> / <span>SCHEMA</span> / <strong id="dtCurrentTab">VANDAAG</strong>
    </div>
    <div class="dt-actions">
      <button class="topbar-gear" onclick="openStats()" title="Stats">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="14" width="4" height="7" rx="1"/>
          <rect x="10" y="9" width="4" height="12" rx="1"/>
          <rect x="17" y="4" width="4" height="17" rx="1"/>
        </svg>
      </button>
      <button class="topbar-gear" onclick="devForceRefresh()" title="Force refresh" style="color:#ff6b35">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <button class="topbar-gear" onclick="switchTab('settings')" title="Instellingen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="races-bar" id="racesBar"></div>

  <div class="update-banner" id="updateBanner" style="display:none" onclick="applyUpdate()">
    <span id="updateBannerText">Update beschikbaar</span>
    <button onclick="applyUpdate();event.stopPropagation()">Nu updaten</button>
  </div>

  <div class="scroll-area" id="scrollArea">

    <div class="view active" id="view-today"><div id="todayContent"></div></div>
    <div class="view" id="view-week"><div id="weekContent"></div></div>

    <div class="view" id="view-plan" style="padding:0">
      <div id="planPageTitle"></div>
      <div class="phase-strip" id="phaseTabs" style="padding:0 16px;margin-top:10px"></div>
      <div id="planContent" style="padding:0 16px 16px"></div>
    </div>

    <div class="view" id="view-calendar"><div id="calContent"></div></div>

    <div class="view" id="view-settings">
      <div class="settings-group">
        <div class="settings-group-title" data-i18n="sg_account"></div>
        <div class="settings-section" id="accountSection"></div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title" data-i18n="sg_profile"></div>
        <div class="settings-section">
          <div class="settings-field">
            <label class="settings-label" data-i18n="your_name"></label>
            <input type="text" class="settings-input" id="settingsName" oninput="saveSettingsName()">
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-title" data-i18n="pr_title"></div>
          <div class="settings-field">
            <label class="settings-label" data-i18n="pr_add"></label>
            <select class="settings-input" id="prDistSelect" onchange="addPrField()">
              <option value="">---</option>
              <option value="800m">800m</option>
              <option value="1500m">1500m</option>
              <option value="1mile">1 mile</option>
              <option value="5km">5 km</option>
              <option value="10km">10 km</option>
              <option value="10mile">10 mile</option>
              <option value="HM" data-i18n-opt="hm"></option>
              <option value="M" data-i18n-opt="marathon"></option>
            </select>
          </div>
          <div id="prFields"></div>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title" data-i18n="sg_notif"></div>
        <div class="settings-section">
          <div class="settings-title" data-i18n="notif_telegram_title"></div>
          <div class="settings-field">
            <label class="settings-label" data-i18n="notif_telegram"></label>
            <input type="text" class="settings-input" id="telegramUser" placeholder="@gebruikersnaam" oninput="saveTelegram()">
            <div class="settings-hint" data-i18n="notif_hint"></div>
          </div>
          <div class="telegram-status" id="telegramStatus">
            <div class="tg-dot" id="tgDot"></div>
            <span id="tgStatusText" data-i18n="tg_not_linked"></span>
          </div>
          <button class="btn-save" style="margin-top:10px" onclick="verifyTelegram()" id="tgVerifyBtn" data-i18n="tg_verify"></button>
        </div>
        <div class="settings-section">
          <div class="settings-title">Meldingen</div>
          <label class="notif-row" style="display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer">
            <input type="checkbox" id="notifDaily" onchange="saveNotifPrefs()" style="width:16px;height:16px;accent-color:var(--accent)">
            <span>
              <span style="display:block;font-size:12px;color:var(--text)">Dagelijks schema</span>
              <span style="display:block;font-family:var(--font-m);font-size:10px;color:var(--faint)">Dagelijks bericht met je trainingsplan</span>
            </span>
          </label>
          <label class="notif-row" style="display:flex;align-items:center;gap:10px;cursor:pointer">
            <input type="checkbox" id="notifFeedback" onchange="saveNotifPrefs()" style="width:16px;height:16px;accent-color:var(--accent)">
            <span>
              <span style="display:block;font-size:12px;color:var(--text)">Feedback verzoeken</span>
              <span style="display:block;font-family:var(--font-m);font-size:10px;color:var(--faint)">Bericht na actieve training om te beoordelen</span>
            </span>
          </label>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title" data-i18n="sg_connect"></div>
        <div class="settings-section" id="connectSection"></div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title" data-i18n="sg_app"></div>
        <div class="settings-section">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <span style="font-family:var(--font-m);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase">Thema</span>
            <button onclick="toggleTheme()" id="themeToggleBtn" style="background:none;border:1px solid var(--border);padding:6px 12px;cursor:pointer;font-size:18px;border-radius:999px;-webkit-tap-highlight-color:transparent">🌙</button>
          </div>
          <div style="font-size:11px;color:var(--faint);font-family:var(--font-m);line-height:1.8">RunningX v3.1.0</div>
        </div>
      </div>
      <div class="settings-group" style="padding-bottom:8px">
        <div class="settings-section" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px">
          <button class="lang-btn" id="langBtnNl" onclick="setLang('nl')" style="font-size:20px;background:none;border:none;cursor:pointer;opacity:0.45;transition:opacity 0.15s;padding:4px">🇳🇱</button>
          <button class="lang-btn" id="langBtnEn" onclick="setLang('en')" style="font-size:20px;background:none;border:none;cursor:pointer;opacity:0.45;transition:opacity 0.15s;padding:4px">🇬🇧</button>
        </div>
      </div>
    </div>

  </div>

  <div class="bottom-nav" id="bottomNav">
    <div id="sidebarLogoInner" style="display:none" class="sb-logo-inner">
      <!-- filled by JS on desktop -->
    </div>
    <div class="bn-pill">
      <span class="sb-section-label">SCHEMA</span>
      <button class="bn-item active" data-tab="today">
        <span class="bn-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3.1 2.6 10.4a1 1 0 0 0 .6 1.8H5v8a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-8h1.8a1 1 0 0 0 .6-1.8L12 3.1z"/></svg></span>
        <span class="bn-label"></span>
      </button>
      <button class="bn-item" data-tab="week">
        <span class="bn-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2H7zm-2 8h14v10H5V10z"/><rect x="7" y="13" width="4" height="4" fill="currentColor" opacity="0.5"/></svg></span>
        <span class="bn-label"></span>
      </button>
      <button class="bn-item" data-tab="plan">
        <span class="bn-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="16.5" cy="3.8" r="2"/><path d="M13.5 7.5c-1.2.2-2.2.9-3 1.9l-2.1 2.6a1 1 0 0 0 .2 1.4l2.2 1.6-1.8 4.3a1 1 0 0 0 1.8.8l2.3-4.6a1.2 1.2 0 0 0-.3-1.4l-1.1-.9 1.4-1.7.8 1.9c.3.6.9 1 1.5 1.1l2.7.5a1 1 0 0 0 .3-2l-2.3-.4-1.6-3.5a2 2 0 0 0-2-1.6z"/><path d="M7 14l-3 4a1 1 0 0 0 1.6 1.2l2.9-3.7L7 14z"/></svg></span>
        <span class="bn-label"></span>
      </button>
      <button class="bn-item" data-tab="calendar">
        <span class="bn-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2H7zm-2 8h14v10H5V10z"/></svg></span>
        <span class="bn-label"></span>
      </button>
    </div>
    <div id="sidebarPlanInfo" style="display:none">
      <div style="font-family:var(--font-m);font-size:9px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">PLAN</div>
      <div id="sbFaseLabel" style="font-family:var(--font-m);font-size:10px;color:var(--muted);margin-bottom:2px">—</div>
      <div id="sbWeekLabel" style="font-family:var(--font-m);font-size:9px;color:var(--faint)">—</div>
      <div id="sbProgressBar" style="height:2px;background:var(--border);margin-top:8px;border-radius:1px">
        <div id="sbProgressFill" style="height:100%;background:var(--accent);width:0%;border-radius:1px;transition:width 0.3s"></div>
      </div>
    </div>
  </div>

</div>

<div class="stats-overlay" id="statsOverlay" style="display:none" onclick="closeStats(event)">
  <div class="stats-sheet" onclick="event.stopPropagation()">
    <div class="stats-grabber"></div>
    <div id="statsContent"></div>
  </div>
</div>

<script src="rx-icons.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
